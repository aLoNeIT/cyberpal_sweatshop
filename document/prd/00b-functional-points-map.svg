  <text x="40" y="482" font-size="11" fill="#37474F">• 自动归档（auto_archive_days）</text>
  <text x="40" y="498" font-size="11" fill="#37474F">• 会话续写 / 分叉</text>
  <text x="40" y="514" font-size="11" fill="#37474F">• 多设备会话安全</text>

