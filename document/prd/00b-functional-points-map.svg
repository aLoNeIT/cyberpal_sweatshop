  <text x="40" y="434" font-size="11" fill="#37474F">• 流式对话（WebSocket 推送）</text>
  <text x="40" y="450" font-size="11" fill="#37474F">• 消息 / Thinking / Tool 折叠（cs_messages / cs_events）</text>
