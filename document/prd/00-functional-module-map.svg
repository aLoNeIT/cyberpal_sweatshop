<svg viewBox="0 0 680 822" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pi-Agent SaaS 平台全局功能模块图（审计版）</title>
  <desc>用户端 8 模块 + 管理端 6 模块 + 跨端公共能力，按设计状态着色：绿=已设计/已就绪，黄=仅占位/待建，红=缺失/待补。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="500" fill="#0C447C">Pi-Agent SaaS 平台 · 全局功能模块图（审计版 2026-07-22）</text>

  <!-- Platform node -->
  <rect x="230" y="40" width="220" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
