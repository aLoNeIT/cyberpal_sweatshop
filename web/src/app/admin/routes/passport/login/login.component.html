<div class="loginbody">
  <div style="height: 50px"> </div>
  <div nz-row nzJustify="center">
    <div nz-col nzXs="22" nzSm="16" nzMd="10" nzLg="8" style="padding-top: 80px">
      <div class="formbody">
        <div class="logintext">CyberPal 管理后台</div>
        <p style="text-align: center; color: #999; margin-top: 8px;">AI Agent 管理平台</p>
        <form nz-form [formGroup]="form" (ngSubmit)="submit()" role="form">
          <nz-form-item style="margin-top: 35px">
            <nz-form-control [nzErrorTip]="accountErrorTip">
              <nz-input-group nzSize="large">
                <input nz-input formControlName="account" placeholder="用户名" />
              </nz-input-group>
              <ng-template #accountErrorTip let-control>
                @if (control.errors.required) {
                  用户名不能为空
                }
              </ng-template>
            </nz-form-control>
          </nz-form-item>
          <nz-form-item style="margin-top: 20px">
            <nz-form-control [nzErrorTip]="pwdErrorTip">
              <nz-input-group nzSize="large">
                <input nz-input type="password" formControlName="password" placeholder="密码" minlength="6" />
              </nz-input-group>
              <ng-template #pwdErrorTip let-control>
                @if (control.errors.required) {
                  密码不能为空
                }
                @if (control.hasError('minlength')) {
                  密码长度不够
                }
              </ng-template>
            </nz-form-control>
          </nz-form-item>
          <nz-form-item style="margin-top: 20px">
            <nz-form-control nzErrorTip="验证码不能为空">
              <nz-input-group nzSize="large" [nzSuffix]="suffixIconSearch">
                <input nz-input formControlName="code" placeholder="请输入验证码" />
              </nz-input-group>
              <ng-template #suffixIconSearch>
                <div style="width: 100px; height: 25px; cursor: pointer" (click)="getcode()">
                  <img [src]="src" alt="" style="width: 100%; height: 100%" />
                </div>
              </ng-template>
            </nz-form-control>
          </nz-form-item>
          <nz-form-item style="margin-top: 20px">
            <button class="mt-md" nz-button type="submit" nzType="primary" nzSize="large" [nzLoading]="http.loading" nzBlock>
              立即登录
            </button>
          </nz-form-item>
        </form>
      </div>
    </div>
  </div>
</div>
