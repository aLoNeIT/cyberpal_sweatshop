<svg viewBox="0 0 1000 1130" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pi-Agent SaaS 平台 · 功能点全景图（端→模块→功能点）</title>
  <desc>用户端 8 模块 + 管理端 6 模块 + 跨端公共能力 7 项，逐层展开功能点（functional point），并标注设计/建表状态。绿=已设计/已建表，黄=仅占位/待建。</desc>

  <text x="500" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#0C447C">Pi-Agent SaaS 平台 · 功能点全景图</text>
  <text x="500" y="46" text-anchor="middle" font-size="12" fill="#5A6B7B">端 → 模块 → 功能点（functional point）· 单一 cs_user 按 usr_app_type 分区隔离 · 2026-07-22 更新</text>

  <!-- Pillars -->
  <rect x="20" y="62" width="470" height="34" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="40" y="84" font-size="14" font-weight="600" fill="#0C447C">用户端 User End（app_type=4）</text>
  <rect x="510" y="62" width="470" height="34" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="530" y="84" font-size="14" font-weight="600" fill="#0C447C">管理端 Admin End（app_type=1）</text>

  <!-- ============ USER END (x=20 w=470) ============ -->

  <!-- L1 账号体系 -->
  <rect x="20" y="108" width="470" height="114" rx="8" fill="#F1F8E9" stroke="#7CB342" stroke-width="1"/>
  <text x="36" y="128" font-size="13" font-weight="600" fill="#0C447C">账号体系</text>
  <text x="430" y="128" font-size="10" fill="#7A8B99">R-001</text>
  <circle cx="476" cy="123" r="4" fill="#2E7D32"/>
  <text x="40" y="150" font-size="11" fill="#37474F">• 注册 / 登录（usr_app_type=4）</text>
  <text x="40" y="166" font-size="11" fill="#37474F">• 个人资料（昵称 / 头像 / 主题）</text>
  <text x="40" y="182" font-size="11" fill="#37474F">• 首次登录强制改密</text>
  <text x="40" y="198" font-size="11" fill="#37474F">• 自助密码重置</text>
  <text x="40" y="214" font-size="11" fill="#37474F">• 存储上限触顶提示（拦截）</text>

  <!-- L2 Agent 管理 -->
  <rect x="20" y="234" width="470" height="130" rx="8" fill="#F1F8E9" stroke="#7CB342" stroke-width="1"/>
  <text x="36" y="254" font-size="13" font-weight="600" fill="#0C447C">Agent 管理</text>
  <text x="416" y="254" font-size="10" fill="#7A8B99">R-002/003/004/009/011/012</text>
  <circle cx="476" cy="249" r="4" fill="#2E7D32"/>
  <text x="40" y="276" font-size="11" fill="#37474F">• Agent 创建 / 编辑 / 删除</text>
  <text x="40" y="292" font-size="11" fill="#37474F">• 启停状态切换（status）</text>
  <text x="40" y="308" font-size="11" fill="#37474F">• 绑定 Skill（cs_agent_skill）</text>
  <text x="40" y="324" font-size="11" fill="#37474F">• per-agent MCP 配置（cs_mcp_config）</text>
  <text x="40" y="340" font-size="11" fill="#37474F">• 选择 Provider / Model</text>
  <text x="40" y="356" font-size="11" fill="#37474F">• 工作目录隔离（闭环 C）</text>

  <!-- L3 会话与聊天 -->
  <rect x="20" y="376" width="470" height="146" rx="8" fill="#F1F8E9" stroke="#7CB342" stroke-width="1"/>
  <text x="36" y="396" font-size="13" font-weight="600" fill="#0C447C">会话与聊天</text>
  <text x="430" y="396" font-size="10" fill="#7A8B99">R-005/006/008/017</text>
  <circle cx="476" cy="391" r="4" fill="#2E7D32"/>
